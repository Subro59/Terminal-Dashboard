<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1rem; 
        }

        .table-container { 
            scrollbar-width: thin; 
            scrollbar-color: #475569 #1e293b; 
            max-height: 60vh; 
            overflow: auto; 
        }

        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #1e293b; }
        .table-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        tr:hover td { background-color: rgba(51, 65, 85, 0.5); }
        tr:hover td.sticky-col-copy { background-color: #1e293b !important; }
        tr:hover td.sticky-col-tid { background-color: #1e293b !important; }

        .clock-font { font-family: 'JetBrains Mono', monospace; }
        
        .header-wrap-2-lines {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            height: 2.4em;
            min-width: 80px;
        }

        .sticky-col-copy { 
            position: sticky; 
            left: 0; 
            z-index: 30; 
            background-color: #1e293b !important; 
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            min-width: 50px;
        }
        .sticky-col-tid { 
            position: sticky; 
            left: 50px; 
            z-index: 30; 
            background-color: #1e293b !important; 
            border-right: 1px solid rgba(255,255,255,0.1);
            min-width: 100px;
        }

        thead th.sticky-col-copy, thead th.sticky-col-tid {
            z-index: 40; 
            background-color: #1e293b !important;
        }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        td { vertical-align: middle; white-space: nowrap; }

        .page-btn { background: #1e293b; border: 1px solid #334155; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: all 0.2s; font-size: 0.75rem; }
        .page-btn:hover:not(:disabled) { background: #334155; border-color: #475569; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .tab-btn { padding: 0.4rem 0.8rem; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 0.5rem; transition: all 0.3s; border: 1px solid transparent; white-space: nowrap; }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .tab-btn:not(.active) { color: #64748b; background: #1e293b; border-color: #334155; }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 38px;
            flex-shrink: 0;
        }
        
        .search-wrapper.expanded { width: 100%; max-width: 300px; }
        .search-input {
            width: 0; opacity: 0; padding: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); height: 38px;
        }
        .search-wrapper.expanded .search-input {
            width: 100%; opacity: 1; padding: 0.5rem 0.75rem 0.5rem 2.75rem; pointer-events: auto;
        }
        .search-icon-btn {
            position: absolute; left: 0; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; color: #94a3b8; background: #1e293b;
            border: 1px solid #334155; border-radius: 0.5rem; transition: all 0.3s;
        }

        .copy-row-btn {
            color: #94a3b8; transition: all 0.2s; padding: 4px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; width: 100%;
        }
        .copy-row-btn:hover { color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .sync-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #warning-modal { opacity: 0; pointer-events: none; transform: scale(0.95); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #warning-modal.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        .shadow-input::placeholder { color: #3b82f6; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body class="p-3 md:p-6">

    <!-- Warning Modal -->
    <div id="warning-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm hidden">
        <div class="glass-card max-w-md w-full p-6 border-rose-500/50 shadow-[0_0_50px_rgba(244,63,94,0.3)] mx-4 text-center">
            <div class="flex flex-col items-center space-y-4">
                <div class="w-16 h-16 bg-rose-500/20 rounded-full flex items-center justify-center mb-2">
                    <i class="fas fa-exclamation-triangle text-3xl text-rose-500 animate-pulse"></i>
                </div>
                <h2 class="text-xl font-black text-white uppercase tracking-tighter">Action Blocked</h2>
                <p id="warning-msg" class="text-slate-400 text-sm leading-relaxed"></p>
                <button onclick="closeWarning()" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-black py-4 rounded-xl transition-all uppercase text-xs tracking-widest">Understood</button>
            </div>
        </div>
    </div>

    <div class="max-w-full mx-auto space-y-4">
        <header class="flex flex-row justify-between items-start border-b border-slate-800 pb-4">
            <div class="pr-2">
                <h1 class="text-xl md:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400">Terminal Dashboard</h1>
                <div class="flex items-center gap-3 mt-1">
                    <p id="status-text" class="text-slate-400 text-[8px] md:text-[9px] font-bold uppercase flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                        <span id="status-label">Initializing</span>
                    </p>
                    <button onclick="fetchSheetData()" class="bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white px-2 py-1 rounded flex items-center gap-2 transition-all text-[8px] md:text-[9px] font-bold border border-blue-500/20">
                        <i class="fas fa-sync-alt" id="sync-icon"></i> <span class="hidden sm:inline">Sync</span>
                    </button>
                </div>
            </div>
            
            <div class="flex flex-col items-end text-right">
                <div id="digital-clock" class="text-2xl md:text-3xl font-bold clock-font text-white tracking-tighter leading-none">00:00:00</div>
                <div id="digital-date" class="text-[8px] md:text-[9px] text-blue-400 font-bold uppercase tracking-[0.1em] mt-2 bg-blue-500/10 px-2 py-1 rounded-full">-- --- ----</div>
            </div>
        </header>

        <section id="stats-grid" class="flex overflow-x-auto gap-2 pb-2 no-scrollbar scroll-smooth"></section>

        <section class="glass-card overflow-hidden flex flex-col shadow-2xl">
            <div class="p-3 border-b border-slate-700/50 bg-slate-800/20 flex flex-col gap-3">
                <div id="tabs-container" class="flex overflow-x-auto gap-1.5 no-scrollbar pb-1"></div>
                
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-3 flex-shrink-0">
                         <span id="result-count" class="text-[9px] font-bold bg-slate-800/50 text-blue-400 px-2 py-1 rounded border border-blue-500/10 min-w-fit">0 Results</span>
                         <span id="page-info" class="text-[8px] text-slate-500 uppercase font-black tracking-widest whitespace-nowrap">Page 1 of 1</span>
                    </div>

                    <div class="flex items-center gap-2 flex-grow justify-end">
                        <div id="searchWrapper" class="search-wrapper">
                            <div class="search-icon-btn" onclick="toggleSearch()">
                                <i class="fas fa-search text-xs"></i>
                            </div>
                            <input type="text" id="tableSearch" onkeyup="handleSearch()" onblur="collapseSearch()" placeholder="Search..." class="search-input bg-slate-900 border border-slate-700 rounded-lg text-[11px] focus:border-blue-500 outline-none text-slate-200">
                        </div>

                        <button onclick="downloadTableData()" class="h-[38px] bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white px-3 py-2 rounded-lg flex items-center gap-2 transition-all text-[9px] font-black uppercase tracking-widest border border-emerald-500/20 flex-shrink-0">
                            <i class="fas fa-file-excel"></i> <span class="hidden sm:inline">Export</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="table-container">
                <table class="w-full text-left text-[11px]" id="terminalTable">
                    <thead class="sticky top-0 z-40" id="terminalTableHeader"></thead>
                    <tbody id="terminalTableBody" class="divide-y divide-slate-800/50">
                        <tr><td colspan="30" class="p-10 text-center text-slate-500 italic">Syncing with server...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 bg-slate-900/40 border-t border-slate-700/50 flex justify-between items-center">
                <div class="flex gap-2">
                    <button class="page-btn text-[10px]" onclick="changePage(-1)" id="prev-btn" disabled>Prev</button>
                    <button class="page-btn text-[10px]" onclick="changePage(1)" id="next-btn" disabled>Next</button>
                </div>
                <div class="text-[9px] text-slate-500 font-bold uppercase">50 rows per page</div>
            </div>
        </section>

        <section class="glass-card p-4 border-l-4 border-l-blue-500">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <div class="flex items-center gap-2">
                    <i class="fas fa-edit text-blue-500 text-xs"></i>
                    <h2 class="text-[10px] font-black text-white uppercase tracking-widest">Terminal Update</h2>
                </div>
                <div class="flex items-center gap-2">
                    <div id="dba-indicator" class="text-[8px] font-black uppercase px-2 py-0.5 rounded opacity-0 bg-slate-800 text-slate-300 border border-slate-700 max-w-[120px] truncate">-</div>
                    <div id="lookup-indicator" class="text-[8px] font-bold uppercase px-2 py-0.5 rounded opacity-0">...</div>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-8 gap-3">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Target Sheet</label>
                    <select id="u-sheet" onchange="handleTIDLookup()" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs focus:border-blue-500 outline-none text-slate-200"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">TID *</label>
                    <input type="text" id="u-tid" oninput="handleTIDLookup()" placeholder="Enter TID" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">POS S/N *</label>
                    <input type="text" id="u-psn" placeholder="Serial No." class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Roll-out By</label>
                    <input type="text" id="u-rby" placeholder="Name" class="shadow-input w-full bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase flex justify-between">
                        <span>Date *</span>
                    </label>
                    <input type="date" id="u-rdate" required class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none text-slate-200">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">App Version</label>
                    <input type="text" id="u-ver" placeholder="v1.0.0" class="shadow-input w-full bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs focus:border-blue-500 outline-none text-slate-200">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Remarks</label>
                    <input type="text" id="u-rem" placeholder="..." class="shadow-input w-full bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="flex items-end">
                    <button id="btn-submit" onclick="submitUpdate()" class="w-full bg-blue-600 hover:bg-blue-500 px-4 py-3 rounded font-bold text-[10px] uppercase transition-all shadow-lg text-white">Update</button>
                </div>
            </div>
        </section>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-3 rounded-xl text-white text-[11px] font-black uppercase tracking-widest transition-all duration-300 opacity-0 pointer-events-none z-[200] shadow-2xl"></div>

    <script>
        const BASE_API_URL = `https://script.google.com/macros/s/AKfycbxXCYOfXdXHvFRf7EVcKfowf6m0fMFJXtwNvZKrT9O1W6LI1gnSDi-tabHE-2caGLvP/exec`;

        let allSheetsData = {};
        let sheetHeaders = {};
        let currentSheet = '';
        let filteredData = [];
        let currentPage = 1;
        const pageSize = 50; 

        let matchedRef = { rollBy: '', date: '', version: '', remarks: '' };

        const cleanStr = (val) => String(val || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase().trim();
        const normalizeVer = (val) => String(val || '').trim().toLowerCase();

        function toggleSearch() {
            const wrapper = document.getElementById('searchWrapper');
            const input = document.getElementById('tableSearch');
            wrapper.classList.toggle('expanded');
            if (wrapper.classList.contains('expanded')) input.focus();
        }

        function collapseSearch() {
            const wrapper = document.getElementById('searchWrapper');
            const input = document.getElementById('tableSearch');
            if (input.value.trim() === '') wrapper.classList.remove('expanded');
        }

        function updateClock() {
            const now = new Date();
            const optionsTime = { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const optionsDate = { timeZone: 'Asia/Dhaka', weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('digital-clock').textContent = now.toLocaleTimeString('en-US', optionsTime);
            document.getElementById('digital-date').textContent = now.toLocaleDateString('en-US', optionsDate);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function setStatus(msg, colorClass) {
            document.getElementById('status-label').textContent = msg;
            const dot = document.getElementById('status-dot');
            if (dot) dot.className = `w-2 h-2 rounded-full ${colorClass}`;
        }

        function formatDateReadable(dateStr) {
            if (!dateStr || dateStr === '-' || dateStr === 'null' || dateStr === 'undefined') return '';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                const day = date.getDate();
                const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                return `${day < 10 ? '0' + day : day}-${monthNames[date.getMonth()]}-${date.getFullYear()}`;
            } catch(e) { return dateStr; }
        }

        function formatDateForInput(dateStr) {
            if (!dateStr || dateStr === '-') return '';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return '';
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            } catch(e) { return ''; }
        }

        function copyRowData(rowIndex) {
            const row = filteredData[rowIndex];
            const headers = sheetHeaders[currentSheet] || [];
            const tidIdx = headers.findIndex(h => h?.toUpperCase() === 'TID');
            const dbaIdx = headers.findIndex(h => h?.toUpperCase() === 'DBA NAME');
            const addrIdx = headers.findIndex(h => h?.toUpperCase() === 'ADDRESS');
            const tidValue = row[tidIdx] || '-';
            const mNameValue = row[dbaIdx] || '-';
            const addressValue = row[addrIdx] || '-';
            const text = `TID:- ${tidValue}\nM.Name:- ${mNameValue}\nAddress:- ${addressValue}`;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            showToast("Data Copied!", "bg-blue-600");
            document.body.removeChild(textArea);
        }

        function showWarning(msg) {
            const modal = document.getElementById('warning-modal');
            const msgEl = document.getElementById('warning-msg');
            msgEl.textContent = msg;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeWarning() {
            const modal = document.getElementById('warning-modal');
            modal.classList.remove('active');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function fetchSheetData() {
            setStatus('Syncing...', 'bg-blue-500 animate-pulse');
            const syncIcon = document.getElementById('sync-icon');
            if (syncIcon) syncIcon.classList.add('sync-spin');
            
            const callback = 'cb_' + Math.floor(Math.random() * 1000000);
            window[callback] = (res) => {
                if (!res) {
                    setStatus('Error', 'bg-rose-500');
                    if (syncIcon) syncIcon.classList.remove('sync-spin');
                    return;
                }
                allSheetsData = {}; sheetHeaders = {};
                Object.keys(res).forEach(sheetName => {
                    const rows = res[sheetName];
                    if (Array.isArray(rows) && rows.length > 0) {
                        sheetHeaders[sheetName] = rows[0]; 
                        allSheetsData[sheetName] = rows.slice(1);
                    }
                });
                const sheetNames = Object.keys(allSheetsData);
                if (sheetNames.length > 0) {
                    setStatus('Connected', 'bg-emerald-500');
                    if (!currentSheet || !allSheetsData[currentSheet]) currentSheet = sheetNames[0];
                    renderDynamicUI(sheetNames);
                    switchSheet(currentSheet);
                }
                if (syncIcon) syncIcon.classList.remove('sync-spin');
                document.getElementById('jsonp-' + callback)?.remove();
                delete window[callback];
            };

            const script = document.createElement('script');
            script.id = 'jsonp-' + callback;
            script.src = `${BASE_API_URL}?action=fetchData&callback=${callback}&_t=${Date.now()}`;
            document.body.appendChild(script);
        }

        function renderDynamicUI(sheetNames) {
            const tabsContainer = document.getElementById('tabs-container');
            if (!tabsContainer) return;
            tabsContainer.innerHTML = '';
            sheetNames.forEach(name => {
                const btn = document.createElement('button');
                btn.id = `tab-${name}`;
                btn.onclick = () => switchSheet(name);
                btn.className = `tab-btn ${name === currentSheet ? 'active' : ''}`;
                btn.textContent = name.replace(' LIVE', '');
                tabsContainer.appendChild(btn);
            });

            const select = document.getElementById('u-sheet');
            if (select) {
                select.innerHTML = '';
                sheetNames.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    select.appendChild(opt);
                });
            }

            const statsGrid = document.getElementById('stats-grid');
            if (statsGrid) {
                statsGrid.innerHTML = '';
                sheetNames.forEach((name) => {
                    const card = document.createElement('div');
                    card.className = `glass-card p-2 border-b-2 border-blue-500 transition-all hover:bg-slate-800/40 cursor-pointer flex-shrink-0 min-w-[80px]`;
                    card.onclick = () => switchSheet(name);
                    card.innerHTML = `<p class="text-[8px] font-black uppercase tracking-tighter opacity-70 truncate">${name.replace(' LIVE', '')}</p><h3 class="text-sm md:text-base font-black mt-0.5 leading-tight">${(allSheetsData[name] || []).length}</h3>`;
                    statsGrid.appendChild(card);
                });
            }
        }

        function switchSheet(sheetName) {
            currentSheet = sheetName;
            
            // Sync the active tab visual state
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `tab-${sheetName}`));
            
            // CRITICAL: Synchronize the "Target Sheet" dropdown to match the selected tab
            const targetSheetSelect = document.getElementById('u-sheet');
            if (targetSheetSelect) {
                targetSheetSelect.value = sheetName;
            }

            filteredData = [...(allSheetsData[sheetName] || [])];
            currentPage = 1;
            renderTable();
            handleTIDLookup(); 
        }

        function renderTable() {
            const headerRow = document.getElementById('terminalTableHeader');
            const tbody = document.getElementById('terminalTableBody');
            const headers = sheetHeaders[currentSheet] || [];
            if (!tbody || headers.length === 0) return;

            const isPBL = currentSheet.toUpperCase().includes('PBL');
            const hideForPBL = ['REMARKS', 'CONFIGURE BY'];
            const visibleIndices = headers.map((h, idx) => {
                if (isPBL && hideForPBL.includes((h || '').toUpperCase())) return null;
                return idx;
            }).filter(idx => idx !== null);

            let headerHtml = '<tr class="text-slate-400 uppercase font-black tracking-wider border-b border-slate-700">';
            headerHtml += `<th class="p-3 sticky-col-copy"><div class="header-wrap-2-lines flex items-center justify-center">COPY</div></th>`;
            visibleIndices.forEach(idx => {
                const label = headers[idx] || `Col ${idx + 1}`;
                const lower = label.toLowerCase();
                let extraClass = "p-3 bg-slate-800";
                let textClass = "header-wrap-2-lines";
                if (lower.includes('tid') || lower === 'id') {
                    extraClass += " sticky-col-tid";
                    textClass += " text-blue-400";
                }
                headerHtml += `<th class="${extraClass}"><div class="${textClass}">${label}</div></th>`;
            });
            headerHtml += '</tr>';
            headerRow.innerHTML = headerHtml;

            const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            const startIdx = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(startIdx, currentPage * pageSize);

            let bodyHtml = '';
            pageData.forEach((row, dataIdx) => {
                const globalIdx = startIdx + dataIdx;
                bodyHtml += `<tr class="hover:bg-slate-800/30 border-b border-slate-800/20">`;
                bodyHtml += `<td class="p-3 text-center sticky-col-copy"><button onclick="copyRowData(${globalIdx})" class="copy-row-btn"><i class="fas fa-copy"></i></button></td>`;
                visibleIndices.forEach(idx => {
                    let val = row[idx] ?? '-';
                    const label = (headers[idx] || '').toUpperCase();
                    let cellClass = "p-3";
                    let content = val;
                    if (label === 'TID') cellClass += " font-black text-blue-400 sticky-col-tid";
                    if (label.includes('DATE')) content = formatDateReadable(val) || '-';
                    bodyHtml += `<td class="${cellClass}">${content}</td>`;
                });
                bodyHtml += `</tr>`;
            });
            tbody.innerHTML = bodyHtml || '<tr><td colspan="30" class="p-10 text-center">No matching records.</td></tr>';
            
            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('result-count').textContent = `${filteredData.length} Results`;
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            if(prevBtn) prevBtn.disabled = currentPage === 1;
            if(nextBtn) nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }

        function handleSearch() {
            const query = document.getElementById('tableSearch').value.toLowerCase().trim();
            const baseData = allSheetsData[currentSheet] || [];
            if (!query) filteredData = [...baseData];
            else {
                const terms = query.split(',').map(term => term.trim()).filter(term => term !== "");
                filteredData = baseData.filter(row => terms.some(term => row.some(cell => String(cell || '').toLowerCase().includes(term))));
            }
            currentPage = 1; renderTable();
        }

        function changePage(dir) { currentPage += dir; renderTable(); document.querySelector('.table-container').scrollTop = 0; }

        function downloadTableData() {
            if (!filteredData.length) return showToast("No data to export", "bg-rose-600");
            const headers = sheetHeaders[currentSheet] || [];
            const exportRows = [headers, ...filteredData];
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(exportRows);
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, `${currentSheet}_Data.xlsx`);
            showToast("Exported to XLSX", "bg-emerald-600");
        }

        function handleTIDLookup() {
            const tidInput = document.getElementById('u-tid').value.trim();
            const targetSheet = document.getElementById('u-sheet').value;
            const indicator = document.getElementById('lookup-indicator');
            const dbaIndicator = document.getElementById('dba-indicator');
            
            const rollOutByInp = document.getElementById('u-rby');
            const dateInp = document.getElementById('u-rdate');
            const versionInp = document.getElementById('u-ver');
            const remarkInp = document.getElementById('u-rem');

            // Reset local match state
            matchedRef = { rollBy: '', date: '', version: '', remarks: '' };
            rollOutByInp.placeholder = "Name";
            versionInp.placeholder = "v1.0.0";
            remarkInp.placeholder = "...";
            dateInp.value = ""; 

            if (!tidInput || !targetSheet) { 
                indicator.style.opacity = '0'; 
                dbaIndicator.style.opacity = '0'; 
                return; 
            }

            const headers = (sheetHeaders[targetSheet] || []).map(h => String(h || '').toUpperCase().trim());
            const dataRows = allSheetsData[targetSheet] || [];
            
            const tidIdx = headers.findIndex(h => h === 'TID');
            const dbaIdx = headers.findIndex(h => h === 'DBA NAME');
            const rDateIdx = headers.findIndex(h => h === 'ROLL-OUT DATE');
            const rByIdx = headers.findIndex(h => h === 'ROLL-OUT BY');
            const verIdx = headers.findIndex(h => h === 'APP VERSION' || h === 'APP. VERSION');
            
            // Check for Remarks
            let remIdx = headers.findIndex(h => h === 'REMARKS FROM ENGINEER');
            if (remIdx === -1) remIdx = headers.findIndex(h => h === 'REMARKS');

            const match = dataRows.find(row => cleanStr(row[tidIdx]) === cleanStr(tidInput));
            
            if (match) {
                indicator.textContent = "MATCH"; indicator.style.opacity = '1';
                indicator.className = "text-[8px] font-bold uppercase px-2 py-0.5 rounded bg-blue-500/20 text-blue-400";
                dbaIndicator.textContent = match[dbaIdx] ? String(match[dbaIdx]).trim() : "NO DBA"; dbaIndicator.style.opacity = '1';
                
                matchedRef.rollBy = (rByIdx !== -1 && match[rByIdx]) ? String(match[rByIdx]).trim() : "";
                matchedRef.version = (verIdx !== -1 && match[verIdx]) ? String(match[verIdx]).trim() : "";
                matchedRef.remarks = (remIdx !== -1 && match[remIdx]) ? String(match[remIdx]).trim() : "";
                matchedRef.date = (rDateIdx !== -1 && match[rDateIdx]) ? formatDateForInput(match[rDateIdx]) : "";

                // Update UI hints
                if (matchedRef.rollBy) rollOutByInp.placeholder = matchedRef.rollBy;
                if (matchedRef.version) versionInp.placeholder = matchedRef.version;
                if (matchedRef.remarks) remarkInp.placeholder = matchedRef.remarks;
                if (matchedRef.date) dateInp.value = matchedRef.date; 
            } else {
                indicator.style.opacity = '1'; indicator.textContent = "NOT FOUND";
                indicator.className = "text-[8px] font-bold uppercase px-2 py-0.5 rounded bg-rose-500/10 text-rose-500";
                dbaIndicator.style.opacity = '0';
            }
        }

        function submitUpdate() {
            const targetSheet = document.getElementById('u-sheet').value;
            const tid = document.getElementById('u-tid').value.trim();
            const psnRaw = document.getElementById('u-psn').value.trim();
            
            // Use input value or fallback to matched reference (preview data)
            const date = document.getElementById('u-rdate').value || matchedRef.date;
            const version = document.getElementById('u-ver').value.trim() || matchedRef.version;
            const rollBy = document.getElementById('u-rby').value.trim() || matchedRef.rollBy;
            const remarks = document.getElementById('u-rem').value.trim() || matchedRef.remarks;
            
            if(!tid || !psnRaw || !date) return showToast("Required Fields Missing", "bg-rose-600");

            const headers = (sheetHeaders[targetSheet] || []).map(h => String(h || '').toUpperCase().trim());
            const rows = allSheetsData[targetSheet] || [];
            
            const tidIdx = headers.findIndex(h => h === 'TID');
            const psnIdx = headers.findIndex(h => h === 'POS S/N');
            const rDateIdx = headers.findIndex(h => h === 'ROLL-OUT DATE');
            const verIdx = headers.findIndex(h => h === 'APP VERSION' || h === 'APP. VERSION');

            const match = rows.find(r => cleanStr(r[tidIdx]) === cleanStr(tid));
            
            if (!match) return showToast(`TID ${tid} not found`, "bg-rose-600");
            if (cleanStr(match[psnIdx]) !== cleanStr(psnRaw)) return showToast(`S/N Mismatch`, "bg-rose-600");

            // Prevent redundant updates
            const existingDateNormalized = formatDateForInput(match[rDateIdx]);
            const existingVersionNormalized = normalizeVer(match[verIdx]);
            const submittedVersionNormalized = normalizeVer(version);

            if (existingDateNormalized === date && existingVersionNormalized === submittedVersionNormalized) {
                showWarning(`Duplicate detected: TID ${tid} was already updated with these values.`);
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = "Updating...";
            
            const callback = 'upd_' + Date.now();
            window[callback] = (res) => {
                if(res?.success) { 
                    showToast(`Updated ${tid}`, "bg-emerald-600"); 
                    fetchSheetData(); 
                    // Clear inputs
                    document.getElementById('u-tid').value = '';
                    document.getElementById('u-psn').value = '';
                    document.getElementById('u-rby').value = '';
                    document.getElementById('u-ver').value = '';
                    document.getElementById('u-rem').value = '';
                    handleTIDLookup();
                }
                else showToast(res?.message || "Fail", "bg-rose-600");
                btn.disabled = false; btn.textContent = "Update"; 
                document.getElementById('jsonp-'+callback)?.remove();
                delete window[callback];
            };

            const script = document.createElement('script');
            script.id = 'jsonp-' + callback;
            
            // Fixed URL: Included both 'remarks' and 'remarksFromEngineer' to ensure the script catches it
            const params = new URLSearchParams({
                action: 'updateDeployment',
                sheetName: targetSheet,
                tid: tid,
                rollBy: rollBy,
                rollDate: date,
                version: version,
                remarks: remarks, // Common parameter name
                remarksFromEngineer: remarks, // Specific parameter name
                callback: callback
            });

            script.src = `${BASE_API_URL}?${params.toString()}`;
            document.body.appendChild(script);
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.textContent = msg; 
            t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-3 rounded-xl text-white text-[11px] font-black uppercase tracking-widest transition-all duration-300 z-[200] shadow-2xl ${color}`;
            t.style.opacity = '1'; 
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
