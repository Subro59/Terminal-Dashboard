<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Added SheetJS for .xlsx generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .table-container { scrollbar-width: thin; scrollbar-color: #475569 #1e293b; max-height: 60vh; overflow: auto; }
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #1e293b; }
        .table-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        tr:hover td { background-color: rgba(51, 65, 85, 0.5); }
        .clock-font { font-family: 'JetBrains Mono', monospace; }
        
        .sticky-col { position: sticky; left: 0; z-index: 10; background: #1e293b; }
        
        .page-btn { background: #1e293b; border: 1px solid #334155; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: all 0.2s; font-size: 0.75rem; }
        .page-btn:hover:not(:disabled) { background: #334155; border-color: #475569; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .tab-btn { padding: 0.4rem 1rem; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 0.5rem; transition: all 0.3s; border: 1px solid transparent; }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .tab-btn:not(.active) { color: #64748b; background: #1e293b; border-color: #334155; }
        .tab-btn:not(.active):hover { background: #334155; color: #cbd5e1; }

        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-full mx-auto space-y-4">
        <!-- Header -->
        <header class="flex flex-row justify-between items-start border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400">Terminal Dashboard</h1>
                <div class="flex items-center gap-4 mt-1">
                    <p id="status-text" class="text-slate-400 text-[9px] font-bold uppercase flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                        <span id="status-label">Initializing</span>
                    </p>
                    <button onclick="fetchSheetData()" class="bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white px-2 py-1 rounded flex items-center gap-2 transition-all active:scale-95 text-[9px] font-bold border border-blue-500/20">
                        <i class="fas fa-sync-alt" id="sync-icon"></i> REFRESH
                    </button>
                </div>
            </div>
            
            <div class="flex flex-col items-end text-right">
                <div id="digital-clock" class="text-3xl font-bold clock-font text-white tracking-tighter leading-none">00:00:00</div>
                <div id="digital-date" class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em] mt-2 bg-blue-500/10 px-2 py-1 rounded-full">-- --- ----</div>
            </div>
        </header>

        <!-- Dynamic Stats Grid -->
        <section id="stats-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 2xl:grid-cols-12 gap-2">
            <!-- Rendered by JS -->
        </section>

        <!-- Main Registry Section -->
        <section class="glass-card overflow-hidden flex flex-col shadow-2xl">
            <div class="p-3 border-b border-slate-700/50 bg-slate-800/20 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4">
                <div id="tabs-container" class="flex flex-wrap gap-1.5">
                    <!-- Dynamic tabs -->
                </div>
                
                <div class="flex flex-grow justify-between items-center w-full xl:w-auto gap-4">
                    <!-- Left side: Status indicators -->
                    <div class="flex items-center gap-3 whitespace-nowrap ml-2">
                         <span id="result-count" class="text-[9px] bg-slate-800 text-blue-400 px-2 py-1 rounded font-bold">0 Results</span>
                         <span id="page-info" class="text-[8px] text-slate-500 uppercase font-black tracking-widest">Page 1 of 1</span>
                    </div>
                    
                    <!-- Right side: Actions & Search -->
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <button onclick="downloadFilteredData()" title="Download Search Results (.xlsx)" class="bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white h-9 px-3 rounded-lg border border-emerald-500/20 transition-all active:scale-95 flex items-center justify-center gap-2 text-[10px] font-bold">
                            <i class="fas fa-file-excel"></i>
                            <span class="hidden sm:inline">EXPORT EXCEL</span>
                        </button>
                        <div class="relative w-full sm:w-72">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                            <input type="text" id="tableSearch" onkeyup="handleSearch()" placeholder="Search registry..." class="bg-slate-900 border border-slate-700 rounded-lg pl-9 pr-3 py-2 text-[11px] w-full focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-600">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="table-container">
                <table class="w-full text-left text-[11px] border-collapse min-w-[3000px]" id="terminalTable">
                    <thead class="sticky top-0 bg-slate-800 z-20" id="terminalTableHeader"></thead>
                    <tbody id="terminalTableBody" class="divide-y divide-slate-800/50">
                        <tr><td colspan="30" class="p-10 text-center text-slate-500 italic">Connecting to API...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 bg-slate-900/40 border-t border-slate-700/50 flex justify-between items-center">
                <div class="flex gap-2">
                    <button class="page-btn" onclick="changePage(-1)" id="prev-btn" disabled>Prev</button>
                    <button class="page-btn" onclick="changePage(1)" id="next-btn" disabled>Next</button>
                </div>
                <div class="text-[9px] text-slate-500 font-bold uppercase">50 rows/page</div>
            </div>
        </section>

        <!-- Quick Update Panel -->
        <section class="glass-card p-4 border-l-4 border-l-blue-500">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-edit text-blue-500 text-xs"></i>
                <h2 class="text-[10px] font-black text-white uppercase tracking-widest">Update Terminal Status</h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7 gap-3">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Target Sheet</label>
                    <select id="u-sheet" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none text-slate-200">
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">TID *</label>
                    <input type="text" id="u-tid" placeholder="Enter TID" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Roll-out By</label>
                    <input type="text" id="u-rby" placeholder="Name" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Roll-out Date</label>
                    <input type="date" id="u-rdate" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none text-slate-400">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">App. Version</label>
                    <input type="text" id="u-ver" placeholder="v1.0.0" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase">Remarks</label>
                    <input type="text" id="u-rem" placeholder="Add remarks..." class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs focus:border-blue-500 outline-none">
                </div>
                <div class="flex items-end">
                    <button id="btn-submit" onclick="submitUpdate()" class="w-full bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded font-bold text-[10px] uppercase transition-all shadow-lg text-white">Update</button>
                </div>
            </div>
        </section>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-3 rounded-xl text-white text-[11px] font-black uppercase tracking-widest transition-all duration-300 opacity-0 pointer-events-none z-50 shadow-2xl"></div>

    <script>
        const BASE_API_URL = `https://script.google.com/macros/s/AKfycbyji-qyPj6khVZ9O5y24zdcagTbLQD4A9WeKz6aBFj_Pw7Bv16Gky13CdZw_rmUNwUn9A/exec`;

        let allSheetsData = {};
        let sheetHeaders = {};
        let currentSheet = '';
        let filteredData = [];
        let currentPage = 1;
        const pageSize = 50; 

        function updateClock() {
            const now = new Date();
            const optionsTime = { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const optionsDate = { timeZone: 'Asia/Dhaka', weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('digital-clock').textContent = now.toLocaleTimeString('en-US', optionsTime);
            document.getElementById('digital-date').textContent = now.toLocaleDateString('en-US', optionsDate);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function setStatus(msg, colorClass) {
            document.getElementById('status-label').textContent = msg;
            document.getElementById('status-dot').className = `w-2 h-2 rounded-full ${colorClass}`;
        }

        function formatDateReadable(dateStr) {
            if (!dateStr || dateStr === '-' || dateStr === 'null' || dateStr === 'undefined') return '-';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                const day = date.getDate();
                const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                return `${day < 10 ? '0' + day : day}-${monthNames[date.getMonth()]}-${date.getFullYear()}`;
            } catch(e) { return dateStr; }
        }

        function fetchSheetData() {
            setStatus('Syncing...', 'bg-blue-500 animate-pulse');
            const syncIcon = document.getElementById('sync-icon');
            if (syncIcon) syncIcon.classList.add('fa-spin');
            
            const callback = 'cb_' + Date.now();
            window[callback] = (res) => {
                if (!res || typeof res !== 'object') {
                    setStatus('Error', 'bg-rose-500');
                    return;
                }

                allSheetsData = {};
                sheetHeaders = {};
                
                Object.keys(res).forEach(sheetName => {
                    const rows = res[sheetName];
                    if (Array.isArray(rows) && rows.length > 0) {
                        sheetHeaders[sheetName] = rows[0]; 
                        allSheetsData[sheetName] = rows.slice(1);
                    }
                });

                const sheetNames = Object.keys(allSheetsData);
                if (sheetNames.length > 0) {
                    setStatus('Connected', 'bg-emerald-500');
                    if (!currentSheet || !allSheetsData[currentSheet]) {
                        currentSheet = sheetNames[0];
                    }
                    renderDynamicUI(sheetNames);
                    switchSheet(currentSheet);
                } else {
                    setStatus('Empty', 'bg-amber-500');
                }
                
                if (syncIcon) syncIcon.classList.remove('fa-spin');
                delete window[callback];
            };

            const script = document.createElement('script');
            script.src = `${BASE_API_URL}?action=fetchData&callback=${callback}&_t=${Date.now()}`; 
            document.body.appendChild(script);
        }

        function renderDynamicUI(sheetNames) {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';
            sheetNames.forEach(name => {
                const btn = document.createElement('button');
                btn.id = `tab-${name}`;
                btn.onclick = () => switchSheet(name);
                btn.className = `tab-btn ${name === currentSheet ? 'active' : ''}`;
                btn.textContent = name.replace(' LIVE', '');
                tabsContainer.appendChild(btn);
            });

            const select = document.getElementById('u-sheet');
            select.innerHTML = '';
            sheetNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';
            const statColors = ['border-blue-500', 'border-emerald-500', 'border-amber-500', 'border-rose-500', 'border-indigo-500', 'border-cyan-500', 'border-purple-500', 'border-orange-500', 'border-pink-500', 'border-teal-500', 'border-yellow-500', 'border-red-500'];
            
            sheetNames.forEach((name, i) => {
                const color = statColors[i % statColors.length];
                const card = document.createElement('div');
                card.className = `glass-card p-2 border-b-2 ${color} transition-all hover:bg-slate-800/40 cursor-pointer`;
                card.onclick = () => switchSheet(name);
                card.innerHTML = `
                    <p class="text-[8px] font-black uppercase tracking-tighter opacity-70 truncate">${name.replace(' LIVE', '')}</p>
                    <h3 class="text-base font-black mt-0.5 leading-tight">${(allSheetsData[name] || []).length}</h3>
                `;
                statsGrid.appendChild(card);
            });

            const versionCard = document.createElement('div');
            versionCard.className = 'glass-card p-2 border-b-2 border-slate-500 sm:col-span-2';
            versionCard.innerHTML = `
                <p class="text-slate-400 text-[8px] font-black uppercase tracking-widest">APP VERSIONS</p>
                <div id="version-container" class="mt-0.5 flex flex-wrap gap-1 max-h-5 overflow-hidden"></div>
                <div id="version-bars" class="w-full h-1 bg-slate-800 rounded-full flex overflow-hidden mt-1"></div>
            `;
            statsGrid.appendChild(versionCard);
        }

        function switchSheet(sheetName) {
            currentSheet = sheetName;
            const tabButtons = document.querySelectorAll('.tab-btn');
            tabButtons.forEach(btn => {
                btn.classList.toggle('active', btn.id === `tab-${sheetName}`);
            });

            filteredData = [...(allSheetsData[sheetName] || [])];
            currentPage = 1;
            updateVersionStats();
            renderTable();
        }

        function updateVersionStats() {
            const currentHeaders = sheetHeaders[currentSheet] || [];
            const versionIdx = currentHeaders.findIndex(h => h && String(h).trim().toUpperCase() === 'APP. VERSION');
            const currentData = allSheetsData[currentSheet] || [];
            
            const versions = {};
            if (versionIdx !== -1) {
                currentData.forEach(r => {
                    const val = r[versionIdx];
                    const ver = (val !== undefined && val !== null && String(val).trim() !== '') ? String(val).trim() : 'N/A';
                    versions[ver] = (versions[ver] || 0) + 1;
                });
            }
            
            const container = document.getElementById('version-container');
            const bars = document.getElementById('version-bars');
            if (!container || !bars) return;

            container.innerHTML = '';
            bars.innerHTML = '';

            const colors = ['bg-purple-500', 'bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-rose-500'];
            let colorIdx = 0;
            const versionKeys = Object.keys(versions).sort();
            
            versionKeys.forEach(v => {
                const count = versions[v];
                const color = colors[colorIdx % colors.length];
                const span = document.createElement('span');
                span.className = 'text-[7px] text-slate-400 font-bold bg-slate-900/50 px-1 rounded';
                span.innerHTML = `${v}: ${count}`;
                container.appendChild(span);

                const segment = document.createElement('div');
                const percent = (count / (currentData.length || 1)) * 100;
                segment.className = `h-full ${color}`;
                segment.style.width = `${percent}%`;
                bars.appendChild(segment);
                colorIdx++;
            });
        }

        function renderTable() {
            const headerRow = document.getElementById('terminalTableHeader');
            const tbody = document.getElementById('terminalTableBody');
            if (!tbody || !headerRow) return;

            const headers = sheetHeaders[currentSheet] || [];
            if (headers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="30" class="p-10 text-center text-slate-500 italic">No records found.</td></tr>';
                return;
            }

            // Define columns to hide for PBL
            const hideForPBL = ['REMARKS', 'CONFIGURE BY'];
            const isPBL = currentSheet.toUpperCase().includes('PBL');

            // Find indices of columns to show
            const visibleIndices = headers.map((h, idx) => {
                const label = (h || '').toUpperCase();
                if (isPBL && hideForPBL.includes(label)) return null;
                return idx;
            }).filter(idx => idx !== null);

            let headerHtml = '<tr class="text-slate-400 uppercase font-bold tracking-wider border-b border-slate-700">';
            visibleIndices.forEach(idx => {
                const label = headers[idx] || `Col ${idx + 1}`;
                const lower = label.toLowerCase();
                let extraClass = "p-2 bg-slate-800";
                if (lower.includes('tid') || lower === 'id') extraClass += " sticky-col text-blue-400";
                headerHtml += `<th class="${extraClass}">${label}</th>`;
            });
            headerHtml += '</tr>';
            headerRow.innerHTML = headerHtml;

            const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            const start = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(start, start + pageSize);

            let bodyHtml = '';
            pageData.forEach(row => {
                bodyHtml += `<tr class="hover:bg-slate-800/30 border-b border-slate-800/20">`;
                visibleIndices.forEach(idx => {
                    let val = row[idx];
                    if (val === undefined || val === null || String(val).trim() === '') val = '-';
                    const h = headers[idx];
                    const label = (h || '').toUpperCase();
                    let cellClass = "p-2";
                    let content = val;

                    if (label === 'TID') cellClass += " font-black text-blue-400 sticky-col";
                    if (label.includes('DATE')) content = formatDateReadable(val);
                    if (label === 'APP. VERSION') content = `<span class="px-1.5 py-0.5 bg-slate-800 rounded text-purple-400 font-bold">${val}</span>`;
                    
                    // Display fix: Ensure display shows leading zero for specific columns
                    if (label === 'BANK CONT. PERSON NUMBER' || label === 'SIM NUMBER') {
                        let strVal = String(val).trim();
                        if (strVal !== '-' && strVal !== '' && !strVal.startsWith('0')) {
                             content = '0' + strVal;
                        }
                    }

                    bodyHtml += `<td class="${cellClass}">${content}</td>`;
                });
                bodyHtml += `</tr>`;
            });

            if (filteredData.length === 0) {
                bodyHtml = `<tr><td colspan="${visibleIndices.length}" class="p-20 text-center text-slate-500 italic">No matching records.</td></tr>`;
            }

            tbody.innerHTML = bodyHtml;
            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('result-count').textContent = `${filteredData.length} Results`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages || totalPages === 0;
        }

        function handleSearch() {
            const query = document.getElementById('tableSearch').value.toLowerCase().trim();
            const baseData = allSheetsData[currentSheet] || [];
            filteredData = query ? baseData.filter(r => r.some(c => String(c).toLowerCase().includes(query))) : [...baseData];
            currentPage = 1; 
            renderTable();
        }

        function changePage(dir) {
            currentPage += dir;
            renderTable();
            document.querySelector('.table-container').scrollTop = 0;
        }

        function downloadFilteredData() {
            if (!filteredData || filteredData.length === 0) {
                showToast("No data to download", "bg-amber-600");
                return;
            }

            const rawHeaders = sheetHeaders[currentSheet] || [];
            const headers = rawHeaders.map(h => String(h).toUpperCase());
            
            // Format data for XLSX export
            const finalData = [rawHeaders]; // Start with headers

            filteredData.forEach(row => {
                const rowObj = [];
                row.forEach((cell, idx) => {
                    const header = headers[idx] || "";
                    let val = cell;

                    // Fix 1: Handle Dates (Human Readable)
                    if (header.includes("DATE") && val && val !== "-" && val !== "null") {
                        val = formatDateReadable(val);
                    }

                    // Fix 2: Handle "BANK CONT. PERSON NUMBER" and "SIM NUMBER" (Add leading zero)
                    if (header === 'BANK CONT. PERSON NUMBER' || header === 'SIM NUMBER') {
                        let strVal = String(val).trim();
                        if (strVal !== '-' && strVal !== '' && !strVal.startsWith('0')) {
                            val = '0' + strVal;
                        }
                    }

                    // Fix 3: Force Large Numbers/IDs/Phones to be strings
                    const needsStringForce = header.includes("MID") || 
                                             header.includes("NUMBER") || 
                                             header.includes("S/N") || 
                                             header.includes("SIM") || 
                                             header.includes("TID");

                    if (needsStringForce && val !== null && val !== undefined && val !== "-") {
                        rowObj.push({ v: String(val).trim(), t: 's' }); 
                    } else {
                        rowObj.push(val);
                    }
                });
                finalData.push(rowObj);
            });

            try {
                const worksheet = XLSX.utils.aoa_to_sheet(finalData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, currentSheet.substring(0, 31)); 

                const timestamp = new Date().toISOString().split('T')[0];
                const fileName = `${currentSheet.replace(/\s+/g, '_')}_Registry_${timestamp}.xlsx`;

                XLSX.writeFile(workbook, fileName);
                showToast("Excel generated (Format check complete)", "bg-emerald-600");
            } catch (err) {
                console.error(err);
                showToast("Export failed", "bg-rose-600");
            }
        }

        function submitUpdate() {
            const tid = document.getElementById('u-tid').value.trim();
            if(!tid) return showToast("TID is required", "bg-rose-600");

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = "Syncing...";

            const targetSheet = document.getElementById('u-sheet').value;
            const callbackName = 'upd_' + Date.now();
            
            const params = {
                action: 'updateDeployment',
                sheetName: targetSheet,
                tid: tid,
                rollBy: document.getElementById('u-rby').value.trim(),
                rollDate: document.getElementById('u-rdate').value,
                version: document.getElementById('u-ver').value.trim(),
                remarks: document.getElementById('u-rem').value.trim(),
                callback: callbackName
            };

            const queryString = Object.keys(params)
                .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
                .join('&');

            window[callbackName] = (res) => {
                if(res && res.success) {
                    showToast(`Updated: ${tid} - Sheet Refreshed`, "bg-emerald-600");
                    // Auto-refresh data from Google Sheets after update
                    fetchSheetData(); 
                    ['u-tid', 'u-rby', 'u-rdate', 'u-ver', 'u-rem'].forEach(id => document.getElementById(id).value = '');
                } else {
                    showToast(res?.message || "Update Failed", "bg-rose-600");
                }
                btn.disabled = false;
                btn.textContent = "Update";
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${BASE_API_URL}?${queryString}`;
            document.body.appendChild(script);
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-3 rounded-xl text-white text-[11px] font-black uppercase tracking-widest transition-all duration-300 z-50 shadow-2xl ${color}`;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 4000);
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
